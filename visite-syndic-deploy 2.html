<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <meta name="googlebot" content="noindex, nofollow">
  <title>Visite Syndic</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://alcdn.msauth.net/browser/2.38.2/js/msal-browser.min.js"></script>
  <style>* { box-sizing: border-box; } body { margin: 0; }</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ═══════════════════════════════════════════════════════════════════
//  ⚙️  CONFIGURATION — À MODIFIER AVANT DÉPLOIEMENT
// ═══════════════════════════════════════════════════════════════════
const CLIENT_ID    = "VOTRE_CLIENT_ID";
const TENANT_ID    = "VOTRE_TENANT_ID";
const REDIRECT_URI = "https://VOTRE_COMPTE.github.io/visite-syndic/";

const EMAILS_AUTORISÉS = [
  "collaborateur1@votredomaine.fr",
  "collaborateur2@votredomaine.fr",
  "collaborateur3@votredomaine.fr",
];



// Nom de votre agence (affiché dans le rapport PDF)
const NOM_AGENCE = "Votre Agence Syndic";
// ═══════════════════════════════════════════════════════════════════

const msalConfig = {
  auth: {
    clientId: CLIENT_ID,
    authority: `https://login.microsoftonline.com/${TENANT_ID}`,
    redirectUri: REDIRECT_URI,
  },
  cache: { cacheLocation: "localStorage", storeAuthStateInCookie: true }
};

let msalInstance;
try { msalInstance = new msal.PublicClientApplication(msalConfig); } catch(e) { console.error("MSAL init error:", e); }

// ── Constantes ────────────────────────────────────────────────────────────────
const CATEGORIES = ["Parties communes","Cage d'escalier","Parking","Toiture","Local poubelles","Espaces verts","Boîtes aux lettres","Ascenseur","Façade","Cave","Autre"];
const ACTIONS    = ["Aucune action","Contacter un prestataire","Signaler au conseil syndical","Travaux à prévoir","À surveiller"];
const URGENCY    = [
  { value:"urgent",    label:"Urgent",      emoji:"🔴", bg:"#fee2e2", color:"#dc2626" },
  { value:"planifier", label:"À planifier", emoji:"🟠", bg:"#ffedd5", color:"#ea580c" },
  { value:"info",      label:"Pour info",   emoji:"🟢", bg:"#dcfce7", color:"#16a34a" },
];

const today    = () => new Date().toISOString().split('T')[0];
const nowTime  = () => new Date().toTimeString().slice(0,5);
const uid      = () => Math.random().toString(36).slice(2,9);
const fmtDate  = d => { try { return new Date(d+'T12:00').toLocaleDateString('fr-FR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'}); } catch(e){ return d; }};
const fmtShort = d => { try { return new Date(d+'T12:00').toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'}); } catch(e){ return d; }};

// ── Compression photo (réduit le poids du PDF) ───────────────────────────────
const compressImage = (dataUrl, maxW=1000, quality=0.6) => new Promise(resolve => {
  const img = new Image();
  img.onload = () => {
    const ratio = Math.min(1, maxW / img.width);
    const canvas = document.createElement('canvas');
    canvas.width  = Math.round(img.width  * ratio);
    canvas.height = Math.round(img.height * ratio);
    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
    resolve(canvas.toDataURL('image/jpeg', quality));
  };
  img.onerror = () => resolve(dataUrl);
  img.src = dataUrl;
});

// ── Styles UI ─────────────────────────────────────────────────────────────────
const S = {
  page:    { minHeight:'100vh', background:'#f8fafc', fontFamily:'-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif', color:'#1f2937' },
  header:  { padding:'44px 24px 16px', display:'flex', alignItems:'center', gap:12 },
  back:    { background:'none', border:'none', fontSize:26, color:'#9ca3af', cursor:'pointer', padding:'0 4px', lineHeight:1 },
  title:   { fontSize:22, fontWeight:700, color:'#111827', margin:0 },
  sub:     { fontSize:13, color:'#9ca3af', margin:'2px 0 0' },
  body:    { padding:'0 24px', display:'flex', flexDirection:'column', gap:16 },
  btn:     { width:'100%', background:'#111827', color:'#fff', border:'none', borderRadius:16, padding:'16px', fontSize:16, fontWeight:600, cursor:'pointer' },
  card:    { background:'#fff', borderRadius:16, padding:16, border:'1px solid #e5e7eb' },
  label:   { display:'block', fontSize:11, fontWeight:700, color:'#9ca3af', textTransform:'uppercase', letterSpacing:'0.06em', marginBottom:8 },
  input:   { width:'100%', background:'#fff', border:'1.5px solid #e5e7eb', borderRadius:12, padding:'13px 16px', fontSize:16, color:'#111827', outline:'none', boxSizing:'border-box' },
  textarea:{ width:'100%', background:'#fff', border:'1.5px solid #e5e7eb', borderRadius:12, padding:'13px 16px', fontSize:15, color:'#111827', outline:'none', resize:'none', boxSizing:'border-box', fontFamily:'inherit' },
  fixedBar:{ position:'fixed', bottom:0, left:0, right:0, padding:'16px 24px 28px', background:'linear-gradient(to top, #f8fafc 80%, transparent)' },
  chip:    a => ({ display:'inline-flex', padding:'8px 14px', borderRadius:50, fontSize:13, fontWeight:500, border:'1.5px solid', cursor:'pointer', background:a?'#111827':'#fff', color:a?'#fff':'#6b7280', borderColor:a?'#111827':'#e5e7eb' }),
  urgBtn:  a => ({ flex:1, padding:'10px 4px', borderRadius:12, fontSize:13, fontWeight:500, border:'1.5px solid', cursor:'pointer', textAlign:'center', background:a?'#111827':'#fff', color:a?'#fff':'#6b7280', borderColor:a?'#111827':'#e5e7eb' }),
  actBtn:  a => ({ width:'100%', textAlign:'left', padding:'13px 16px', borderRadius:12, fontSize:14, border:'1.5px solid', cursor:'pointer', background:a?'#111827':'#fff', color:a?'#fff':'#374151', borderColor:a?'#111827':'#e5e7eb' }),
};

// ── Authentification Microsoft ────────────────────────────────────────────────
function AuthWrapper({ children }) {
  const [auth, setAuth] = useState({ loading:true, user:null, error:null });

  useEffect(() => {
    if (!msalInstance) {
      setAuth({ loading:false, user:null, error:"Erreur d'initialisation MSAL. Vérifiez CLIENT_ID et TENANT_ID." });
      return;
    }
    const configOk = CLIENT_ID !== "VOTRE_CLIENT_ID" && TENANT_ID !== "VOTRE_TENANT_ID";
    if (!configOk) {
      setAuth({ loading:false, user:null, error:"config" });
      return;
    }
    // Avec loginPopup, pas de redirect — on vérifie juste le compte en cache
    const account = msalInstance.getAllAccounts()[0];
    if (account) {
      const email = account.username.toLowerCase();
      const autorisé = EMAILS_AUTORISÉS.map(e=>e.toLowerCase()).includes(email);
      setAuth({ loading:false, user: autorisé ? account : null, error: autorisé ? null : 'unauthorized' });
    } else {
      setAuth({ loading:false, user:null, error:null });
    }
  }, []);

  const login = async () => {
    try {
      const resp = await msalInstance.loginPopup({ scopes:["User.Read"] });
      const email = resp.account.username.toLowerCase();
      const autorisé = EMAILS_AUTORISÉS.map(e=>e.toLowerCase()).includes(email);
      setAuth({ loading:false, user: autorisé ? resp.account : null, error: autorisé ? null : 'unauthorized' });
    } catch(e) {
      // L'utilisateur a fermé la popup — on n'affiche pas d'erreur
      if (e.errorCode !== "user_cancelled") {
        setAuth(a => ({...a, loading:false, error: e.message || "Erreur de connexion Microsoft." }));
      }
    }
  };

  const logout = () => {
    try {
      msalInstance.logoutPopup({ postLogoutRedirectUri: REDIRECT_URI });
    } catch(e) {}
    setAuth({ loading:false, user:null, error:null });
  };

  if (auth.loading) return (
    <div style={{...S.page, display:'flex', alignItems:'center', justifyContent:'center'}}>
      <div style={{textAlign:'center', color:'#9ca3af'}}>
        <div style={{fontSize:48, marginBottom:12}}>🏢</div>
        <p>Vérification de la connexion…</p>
      </div>
    </div>
  );

  // Fichier non encore configuré — page d'aide
  if (auth.error === "config") return (
    <div style={{...S.page, display:'flex', alignItems:'center', justifyContent:'center', padding:24}}>
      <div style={{maxWidth:380, width:'100%'}}>
        <div style={{textAlign:'center', marginBottom:28}}>
          <div style={{fontSize:52}}>⚙️</div>
          <h2 style={{fontSize:20, fontWeight:700, color:'#111827', margin:'12px 0 4px'}}>Configuration requise</h2>
          <p style={{fontSize:13, color:'#6b7280', lineHeight:1.6}}>Renseignez les valeurs Azure dans le fichier <code>index.html</code> avant le déploiement.</p>
        </div>
        {[
          ["CLIENT_ID", "Application (client) ID — Azure App registrations"],
          ["TENANT_ID", "ID de l'annuaire — Azure App registrations"],
          ["REDIRECT_URI", "https://VOTRE_COMPTE.github.io/visite-syndic/"],
          ["EMAILS_AUTORISÉS", "Les adresses email des 3 collaborateurs"],
        ].map(([k,v]) => (
          <div key={k} style={{background:'#f9fafb', border:'1px solid #e5e7eb', borderRadius:10, padding:'10px 14px', marginBottom:8}}>
            <code style={{fontSize:13, fontWeight:700, color:'#111827'}}>{k}</code>
            <p style={{margin:'3px 0 0', fontSize:12, color:'#6b7280'}}>{v}</p>
          </div>
        ))}
      </div>
    </div>
  );

  if (auth.error === 'unauthorized') return (
    <div style={{...S.page, display:'flex', alignItems:'center', justifyContent:'center', padding:24}}>
      <div style={{textAlign:'center', maxWidth:360}}>
        <div style={{fontSize:52, marginBottom:16}}>🔒</div>
        <h2 style={{fontSize:20, fontWeight:700, marginBottom:8, color:'#111827'}}>Accès non autorisé</h2>
        <p style={{fontSize:14, color:'#6b7280', marginBottom:24, lineHeight:1.6}}>Votre compte n'est pas dans la liste des accès autorisés. Contactez votre administrateur.</p>
        <button onClick={logout} style={{background:'#fff', color:'#374151', border:'2px solid #e5e7eb', borderRadius:14, padding:'12px 24px', fontSize:15, fontWeight:600, cursor:'pointer'}}>Se déconnecter</button>
      </div>
    </div>
  );

  if (auth.error) return (
    <div style={{...S.page, display:'flex', alignItems:'center', justifyContent:'center', padding:24}}>
      <div style={{textAlign:'center', maxWidth:380}}>
        <div style={{fontSize:52, marginBottom:12}}>⚠️</div>
        <h2 style={{fontSize:18, fontWeight:700, marginBottom:12, color:'#111827'}}>Erreur de connexion</h2>
        <div style={{background:'#fef2f2', border:'1px solid #fecaca', borderRadius:10, padding:'12px 16px', marginBottom:16, textAlign:'left'}}>
          <p style={{margin:0, fontSize:12, color:'#991b1b', fontFamily:'monospace', wordBreak:'break-all'}}>{auth.error}</p>
        </div>
        <p style={{fontSize:12, color:'#6b7280', marginBottom:20, lineHeight:1.6}}>
          Vérifiez que la Redirect URI dans Azure est exactement :<br/>
          <code style={{background:'#f3f4f6', padding:'2px 6px', borderRadius:4}}>{REDIRECT_URI}</code>
        </p>
        <button onClick={login} style={{...S.btn, borderRadius:14, width:'auto', padding:'12px 28px'}}>Réessayer</button>
      </div>
    </div>
  );

  if (!auth.user) return (
    <div style={{...S.page, display:'flex', alignItems:'center', justifyContent:'center', padding:24}}>
      <div style={{textAlign:'center', maxWidth:360, width:'100%'}}>
        <div style={{width:72,height:72,background:'#111827',borderRadius:20,display:'flex',alignItems:'center',justifyContent:'center',fontSize:36,margin:'0 auto 24px'}}>🏢</div>
        <h1 style={{fontSize:26, fontWeight:700, marginBottom:6, color:'#111827'}}>Visite Syndic</h1>
        <p style={{fontSize:13, color:'#9ca3af', marginBottom:36}}>{NOM_AGENCE}</p>
        <p style={{fontSize:14, color:'#6b7280', marginBottom:32, lineHeight:1.6}}>Connectez-vous avec votre compte Microsoft Office 365.</p>
        <button onClick={login} style={{...S.btn, display:'flex', alignItems:'center', justifyContent:'center', gap:12, borderRadius:14, fontSize:15}}>
          <svg width="20" height="20" viewBox="0 0 21 21" fill="none">
            <rect x="1" y="1" width="9" height="9" fill="#f25022"/>
            <rect x="11" y="1" width="9" height="9" fill="#7fba00"/>
            <rect x="1" y="11" width="9" height="9" fill="#00a4ef"/>
            <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
          </svg>
          Se connecter avec Microsoft
        </button>
      </div>
    </div>
  );

  return children({ user: auth.user, logout });
}

// ── Application principale ────────────────────────────────────────────────────
function App() {
  return <AuthWrapper>{({ user, logout }) => <MainApp user={user} logout={logout} />}</AuthWrapper>;
}

function MainApp({ user, logout }) {
  const [screen, setScreen]           = useState("home");
  const [visits, setVisits]           = useState([]);
  const [visit, setVisit]             = useState(null);
  const [obsForm, setObsForm]         = useState(null);
  const [editIdx, setEditIdx]         = useState(null);
  const [detailVisit, setDetailVisit] = useState(null);

  const storageKey = `syndic_visits_${user.username.toLowerCase()}`;

  useEffect(() => {
    try { const r = localStorage.getItem(storageKey); if (r) setVisits(JSON.parse(r)); } catch(e) {}
  }, []);

  const persist = v => { try { localStorage.setItem(storageKey, JSON.stringify(v)); } catch(e) {} };

  const newObs = () => ({ id:uid(), category:CATEGORIES[0], customCategory:"", description:"", photos:[], urgency:"planifier", action:"Aucune action", actionComment:"" });

  const startVisit = () => {
    setVisit({ id:uid(), date:today(), residence:"", persons:"", startTime:nowTime(), endTime:"", redacteur:user.name||user.username, observations:[] });
    setScreen("init");
  };

  const goToObs = () => {
    if (!visit.residence.trim()) return alert("Veuillez saisir le nom de la résidence.");
    setScreen("obs");
  };

  const openObsForm = (idx=null) => {
    setObsForm(idx!==null ? {...visit.observations[idx], photos:[...visit.observations[idx].photos]} : newObs());
    setEditIdx(idx);
    setScreen("obsForm");
  };

  const saveObs = () => {
    const catLabel = obsForm.category==="Autre" ? (obsForm.customCategory.trim()||"Autre") : obsForm.category;
    const o = {...obsForm, categoryLabel:catLabel};
    setVisit(v => {
      const list = [...v.observations];
      if (editIdx!==null) list[editIdx]=o; else list.push(o);
      return {...v, observations:list};
    });
    setScreen("obs");
  };

  const deleteObs = idx => {
    if (!confirm("Supprimer cette observation ?")) return;
    setVisit(v => ({...v, observations:v.observations.filter((_,i)=>i!==idx)}));
  };

  const addPhoto = async (files) => {
    for (const f of Array.from(files)) {
      const reader = new FileReader();
      await new Promise(res => {
        reader.onload = async e => {
          const compressed = await compressImage(e.target.result, 1000, 0.6);
          setObsForm(o => ({...o, photos:[...o.photos, compressed]}));
          res();
        };
        reader.readAsDataURL(f);
      });
    }
  };

  const finishVisit = () => {
    const done = {...visit, endTime: visit.endTime||nowTime()};
    generatePDF(done);
    const all = [done, ...visits];
    setVisits(all);
    persist(all);
    setVisit(null);
    setScreen("home");
  };

  // ── Génération PDF ───────────────────────────────────────────────────────────
  const generatePDF = v => {
    const getUrg = u => URGENCY.find(x=>x.value===u)||URGENCY[1];
    const obsHTML = v.observations.length===0
      ? `<p style="color:#666;font-style:italic;">Aucune observation enregistrée.</p>`
      : v.observations.map((o,i) => {
          const urg = getUrg(o.urgency);
          const urgColors = { urgent:"#c0392b", planifier:"#d35400", info:"#27ae60" };
          const urgBg     = { urgent:"#fadbd8", planifier:"#fdebd0", info:"#d5f5e3" };
          const urgC = urgColors[o.urgency]||"#333";
          const urgB = urgBg[o.urgency]||"#eee";
          return `<div style="margin-bottom:18px;padding:16px;border:1.5px solid #cccccc;border-radius:8px;page-break-inside:avoid;background:#ffffff;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px;">
              <strong style="font-size:15px;color:#111111;">${i+1}. ${o.categoryLabel||o.category}</strong>
              <span style="font-size:12px;padding:4px 12px;border-radius:20px;background:${urgB};color:${urgC};font-weight:700;border:1px solid ${urgC};">${urg.emoji} ${urg.label}</span>
            </div>
            ${o.description?`<p style="margin:0 0 12px;color:#222222;font-size:14px;line-height:1.6;">${o.description}</p>`:''}
            <div style="border:1.5px solid #cccccc;padding:10px 14px;border-radius:6px;font-size:13px;color:#222222;background:#f5f5f5;">
              <strong>Action :</strong> ${o.action}${o.actionComment?` — <em>${o.actionComment}</em>`:''}
            </div>
            ${o.photos&&o.photos.length?`<div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;">${o.photos.map(p=>`<img src="${p}" style="width:150px;height:105px;object-fit:cover;border-radius:6px;border:1px solid #cccccc;"/>`).join('')}</div>`:''}
          </div>`;
        }).join('');

    const urgCounts = URGENCY.map(u=>({...u,count:v.observations.filter(o=>o.urgency===u.value).length})).filter(u=>u.count>0);
    const urgColors = { urgent:"#c0392b", planifier:"#d35400", info:"#27ae60" };
    const urgBgMap  = { urgent:"#fadbd8", planifier:"#fdebd0", info:"#d5f5e3" };

    const html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
<title>Rapport — ${v.residence}</title>
<style>
  * { box-sizing:border-box; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  body { font-family:Arial,Helvetica,sans-serif; max-width:780px; margin:0 auto; padding:32px 28px; color:#111111; font-size:14px; background:#ffffff; }
  h1 { font-size:26px; font-weight:700; margin:0 0 2px; color:#111111; }
  .agence { font-size:14px; color:#444444; margin:0 0 4px; }
  .gendate { font-size:12px; color:#666666; margin:0 0 28px; }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:28px; }
  .info { border:1.5px solid #aaaaaa; border-radius:8px; padding:12px 16px; background:#ffffff; }
  .info .lbl { font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:#444444; font-weight:700; }
  .info .val { font-size:15px; font-weight:700; margin:3px 0 0; color:#111111; }
  h2 { font-size:16px; font-weight:700; border-bottom:2px solid #333333; padding-bottom:10px; margin:0 0 16px; color:#111111; }
  .summary { display:flex; gap:10px; margin-bottom:24px; flex-wrap:wrap; }
  .badge { padding:5px 14px; border-radius:20px; font-size:13px; font-weight:700; border:1.5px solid; }
  .footer { margin-top:40px; padding-top:14px; border-top:1px solid #cccccc; text-align:center; font-size:11px; color:#888888; }
  @media print { body { padding:20px; } }
</style></head><body>
<h1>Rapport de visite</h1>
<p class="agence">${NOM_AGENCE}</p>
<p class="gendate">Généré le ${new Date().toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'})} — par ${v.redacteur||''}</p>
<div class="grid">
  <div class="info"><div class="lbl">Résidence</div><div class="val">${v.residence}</div></div>
  <div class="info"><div class="lbl">Date</div><div class="val">${fmtDate(v.date)}</div></div>
  <div class="info"><div class="lbl">Personnes présentes</div><div class="val">${v.persons||'—'}</div></div>
  <div class="info"><div class="lbl">Horaires</div><div class="val">${v.startTime} → ${v.endTime||'—'}</div></div>
</div>
${urgCounts.length?`<div class="summary">${urgCounts.map(u=>`<span class="badge" style="background:${urgBgMap[u.value]};color:${urgColors[u.value]};border-color:${urgColors[u.value]};">${u.emoji} ${u.count} ${u.label}</span>`).join('')}</div>`:''}
<h2>Observations (${v.observations.length})</h2>
${obsHTML}
<div class="footer">${NOM_AGENCE} — Application Visite Syndic</div>
</body></html>`;

    const w = window.open('','_blank');
    if (w) { w.document.write(html); w.document.close(); setTimeout(()=>w.print(),700); }
  };

  if (screen==="home")    return <HomeScreen visits={visits} onNew={startVisit} onDetail={v=>{setDetailVisit(v);setScreen("detail");}} user={user} onLogout={logout} />;
  if (screen==="init")    return <InitScreen visit={visit} setVisit={setVisit} onNext={goToObs} onBack={()=>setScreen("home")} />;
  if (screen==="obs")     return <ObsScreen  visit={visit} onAdd={()=>openObsForm(null)} onEdit={openObsForm} onDelete={deleteObs} onClose={()=>setScreen("close")} onBack={()=>setScreen("init")} />;
  if (screen==="obsForm") return <ObsFormScreen obsForm={obsForm} setObsForm={setObsForm} onSave={saveObs} onBack={()=>setScreen("obs")} onPhoto={addPhoto} />;
  if (screen==="close")   return <CloseScreen visit={visit} setVisit={setVisit} onFinish={finishVisit} onBack={()=>setScreen("obs")} />;
  if (screen==="detail")  return <DetailScreen visit={detailVisit} onBack={()=>setScreen("home")} onPDF={generatePDF} />;
  return null;
}

// ── Écrans ────────────────────────────────────────────────────────────────────
function HomeScreen({ visits, onNew, onDetail, user, onLogout }) {
  return (
    <div style={S.page}>
      <div style={{...S.header, paddingBottom:24, alignItems:'flex-start'}}>
        <div style={{flex:1}}>
          <p style={{margin:'0 0 2px',fontSize:13,color:'#9ca3af',fontWeight:600,letterSpacing:'0.06em',textTransform:'uppercase'}}>Syndic</p>
          <h1 style={S.title}>Visites</h1>
          <p style={{...S.sub, marginTop:4}}>{user.name||user.username}</p>
        </div>
        <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:8}}>
          <div style={{width:40,height:40,background:'#111827',borderRadius:12,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20}}>🏢</div>
          <button onClick={onLogout} style={{background:'none',border:'none',fontSize:11,color:'#9ca3af',cursor:'pointer',padding:0}}>Déconnexion</button>
        </div>
      </div>
      <div style={{padding:'0 24px 24px'}}>
        <button style={S.btn} onClick={onNew}>+ Nouvelle visite</button>
      </div>
      {visits.length>0 ? (
        <div style={{padding:'0 24px'}}>
          <p style={{...S.label, marginBottom:12}}>Historique</p>
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            {visits.map(v => {
              const urgent = v.observations.filter(o=>o.urgency==='urgent').length;
              return (
                <button key={v.id} onClick={()=>onDetail(v)} style={{...S.card,border:'none',textAlign:'left',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'space-between',padding:'14px 16px'}}>
                  <div>
                    <p style={{margin:0,fontWeight:600,color:'#111827',fontSize:15}}>{v.residence}</p>
                    <p style={{margin:'3px 0 0',fontSize:13,color:'#9ca3af'}}>{fmtShort(v.date)} · {v.observations.length} obs.{urgent?` · 🔴 ${urgent}`:''}</p>
                  </div>
                  <span style={{color:'#d1d5db',fontSize:20}}>›</span>
                </button>
              );
            })}
          </div>
        </div>
      ) : (
        <div style={{textAlign:'center',padding:'48px 24px',color:'#d1d5db'}}>
          <div style={{fontSize:48,marginBottom:12}}>🏗️</div>
          <p style={{margin:0,fontSize:15}}>Aucune visite enregistrée</p>
        </div>
      )}
    </div>
  );
}

function InitScreen({ visit, setVisit, onNext, onBack }) {
  const set = (k,v) => setVisit(x=>({...x,[k]:v}));
  return (
    <div style={S.page}>
      <div style={S.header}>
        <button style={S.back} onClick={onBack}>‹</button>
        <div><h2 style={S.title}>Nouvelle visite</h2><p style={S.sub}>Informations générales</p></div>
      </div>
      <div style={{...S.body,paddingBottom:100}}>
        <Field label="Date" type="date" value={visit.date} onChange={v=>set('date',v)} />
        <Field label="Résidence *" placeholder="Nom de la résidence" value={visit.residence} onChange={v=>set('residence',v)} />
        <Field label="Personnes présentes" placeholder="Ex : M. Martin, Mme Dupont" value={visit.persons} onChange={v=>set('persons',v)} />
        <Field label="Heure de début" type="time" value={visit.startTime} onChange={v=>set('startTime',v)} />
      </div>
      <div style={S.fixedBar}><button style={S.btn} onClick={onNext}>Démarrer la visite →</button></div>
    </div>
  );
}

function ObsScreen({ visit, onAdd, onEdit, onDelete, onClose, onBack }) {
  const urgOf = u => URGENCY.find(x=>x.value===u)||URGENCY[1];
  return (
    <div style={S.page}>
      <div style={S.header}>
        <button style={S.back} onClick={onBack}>‹</button>
        <div style={{flex:1}}>
          <h2 style={S.title}>{visit.residence}</h2>
          <p style={S.sub}>{visit.observations.length} observation{visit.observations.length!==1?'s':''}</p>
        </div>
      </div>
      <div style={{...S.body,paddingBottom:110}}>
        {visit.observations.map((o,i) => {
          const urg = urgOf(o.urgency);
          return (
            <div key={o.id} style={{...S.card,padding:'14px 16px'}}>
              <div style={{display:'flex',alignItems:'flex-start',gap:8}}>
                <div style={{flex:1}}>
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4,flexWrap:'wrap'}}>
                    <span style={{fontSize:11,padding:'3px 10px',borderRadius:20,background:urg.bg,color:urg.color,fontWeight:600}}>{urg.emoji} {urg.label}</span>
                    <span style={{fontWeight:600,color:'#111827',fontSize:14}}>{o.categoryLabel||o.category}</span>
                  </div>
                  {o.description&&<p style={{margin:'0 0 4px',fontSize:13,color:'#6b7280',lineHeight:1.4}}>{o.description.slice(0,90)}{o.description.length>90?'…':''}</p>}
                  <p style={{margin:0,fontSize:12,color:'#9ca3af'}}>{o.action}{o.photos?.length?` · 📷 ${o.photos.length}`:''}</p>
                </div>
                <div style={{display:'flex',gap:4,flexShrink:0}}>
                  <button onClick={()=>onEdit(i)} style={{background:'#f3f4f6',border:'none',borderRadius:8,width:32,height:32,cursor:'pointer',fontSize:14}}>✎</button>
                  <button onClick={()=>onDelete(i)} style={{background:'#fef2f2',border:'none',borderRadius:8,width:32,height:32,cursor:'pointer',fontSize:14,color:'#ef4444'}}>✕</button>
                </div>
              </div>
            </div>
          );
        })}
        <button onClick={onAdd} style={{width:'100%',background:'#fff',border:'2px dashed #e5e7eb',borderRadius:16,padding:20,cursor:'pointer',color:'#9ca3af',fontSize:15,fontWeight:500,display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
          <span style={{fontSize:22,lineHeight:1}}>+</span> Ajouter une observation
        </button>
      </div>
      <div style={S.fixedBar}><button style={S.btn} onClick={onClose}>Clôturer la visite</button></div>
    </div>
  );
}

function ObsFormScreen({ obsForm, setObsForm, onSave, onBack, onPhoto }) {
  const fileRef = useRef();
  const set = (k,v) => setObsForm(f=>({...f,[k]:v}));
  const removePhoto = i => setObsForm(f=>({...f,photos:f.photos.filter((_,j)=>j!==i)}));
  return (
    <div style={S.page}>
      <div style={S.header}>
        <button style={S.back} onClick={onBack}>‹</button>
        <h2 style={S.title}>Observation</h2>
      </div>
      <div style={{...S.body,paddingBottom:100}}>
        <div>
          <span style={S.label}>Catégorie</span>
          <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
            {CATEGORIES.map(c=><button key={c} onClick={()=>set('category',c)} style={S.chip(obsForm.category===c)}>{c}</button>)}
          </div>
          {obsForm.category==="Autre"&&<input placeholder="Précisez..." value={obsForm.customCategory} onChange={e=>set('customCategory',e.target.value)} style={{...S.input,marginTop:10}} />}
        </div>
        <div>
          <span style={S.label}>Description</span>
          <textarea value={obsForm.description} onChange={e=>set('description',e.target.value)} placeholder="Décrivez l'observation…" rows={3} style={S.textarea} />
        </div>
        <div>
          <span style={S.label}>Photos <span style={{fontSize:11,color:'#9ca3af',fontWeight:400,textTransform:'none'}}>(compressées automatiquement)</span></span>
          <div style={{display:'flex',flexWrap:'wrap',gap:10,alignItems:'center'}}>
            {obsForm.photos.map((p,i)=>(
              <div key={i} style={{position:'relative'}}>
                <img src={p} style={{width:80,height:80,objectFit:'cover',borderRadius:12,border:'1px solid #e5e7eb',display:'block'}} />
                <button onClick={()=>removePhoto(i)} style={{position:'absolute',top:-6,right:-6,background:'#ef4444',color:'#fff',border:'none',borderRadius:'50%',width:20,height:20,fontSize:11,cursor:'pointer',lineHeight:1}}>✕</button>
              </div>
            ))}
            <button onClick={()=>fileRef.current.click()} style={{width:80,height:80,border:'2px dashed #e5e7eb',borderRadius:12,background:'#f9fafb',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:4,color:'#9ca3af',fontSize:12}}>
              <span style={{fontSize:24}}>📷</span><span>Ajouter</span>
            </button>
            <input ref={fileRef} type="file" accept="image/*" multiple onChange={e=>onPhoto(e.target.files)} style={{display:'none'}} />
          </div>
        </div>
        <div>
          <span style={S.label}>Niveau d'urgence</span>
          <div style={{display:'flex',gap:8}}>
            {URGENCY.map(u=>(
              <button key={u.value} onClick={()=>set('urgency',u.value)} style={S.urgBtn(obsForm.urgency===u.value)}>
                {u.emoji}<br/><span style={{fontSize:11}}>{u.label}</span>
              </button>
            ))}
          </div>
        </div>
        <div>
          <span style={S.label}>Action à mener</span>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {ACTIONS.map(a=><button key={a} onClick={()=>set('action',a)} style={S.actBtn(obsForm.action===a)}>{a}</button>)}
          </div>
          <textarea value={obsForm.actionComment} onChange={e=>set('actionComment',e.target.value)} placeholder="Précisions sur l'action (optionnel)…" rows={2} style={{...S.textarea,marginTop:10,fontSize:14}} />
        </div>
      </div>
      <div style={S.fixedBar}><button style={S.btn} onClick={onSave}>Enregistrer l'observation</button></div>
    </div>
  );
}

function CloseScreen({ visit, setVisit, onFinish, onBack }) {
  const urgCounts = URGENCY.map(u=>({...u,c:visit.observations.filter(o=>o.urgency===u.value).length})).filter(u=>u.c>0);
  return (
    <div style={S.page}>
      <div style={S.header}>
        <button style={S.back} onClick={onBack}>‹</button>
        <div><h2 style={S.title}>Clôture</h2><p style={S.sub}>{visit.residence}</p></div>
      </div>
      <div style={{...S.body,paddingBottom:100}}>
        <div style={{...S.card,background:'#f9fafb'}}>
          <p style={{margin:'0 0 12px',fontWeight:700,color:'#374151',fontSize:14}}>Récapitulatif</p>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            {[['Résidence',visit.residence],['Date',fmtShort(visit.date)],['Début',visit.startTime],['Observations',visit.observations.length]].map(([l,v])=>(
              <div key={l}><p style={{margin:0,fontSize:11,color:'#9ca3af',fontWeight:600,textTransform:'uppercase'}}>{l}</p><p style={{margin:'2px 0 0',fontWeight:600,color:'#111827'}}>{v}</p></div>
            ))}
          </div>
          {urgCounts.length>0&&<div style={{display:'flex',gap:8,marginTop:12,flexWrap:'wrap'}}>{urgCounts.map(u=><span key={u.value} style={{fontSize:12,padding:'4px 10px',borderRadius:20,background:u.bg,color:u.color,fontWeight:600}}>{u.emoji} {u.c} {u.label}</span>)}</div>}
        </div>
        <Field label="Heure de fin" type="time" value={visit.endTime} onChange={v=>setVisit(x=>({...x,endTime:v}))} />
        <div style={{background:'#fffbeb',border:'1px solid #fde68a',borderRadius:12,padding:'14px 16px'}}>
          <p style={{margin:0,fontWeight:600,color:'#92400e',fontSize:14}}>📄 Rapport PDF</p>
          <p style={{margin:'4px 0 0',fontSize:12,color:'#b45309',lineHeight:1.5}}>Sur iPhone : une fois le rapport ouvert, menu Partager → Enregistrer en PDF.</p>
        </div>
      </div>
      <div style={S.fixedBar}><button style={S.btn} onClick={onFinish}>Générer le rapport &amp; terminer</button></div>
    </div>
  );
}

function DetailScreen({ visit, onBack, onPDF }) {
  const urgOf = u => URGENCY.find(x=>x.value===u)||URGENCY[1];
  return (
    <div style={S.page}>
      <div style={S.header}>
        <button style={S.back} onClick={onBack}>‹</button>
        <div style={{flex:1}}><h2 style={S.title}>{visit.residence}</h2><p style={S.sub}>{fmtShort(visit.date)}</p></div>
        <button onClick={()=>onPDF(visit)} style={{background:'#f3f4f6',border:'none',borderRadius:10,padding:'8px 14px',fontSize:13,fontWeight:600,cursor:'pointer',color:'#374151'}}>📄 PDF</button>
      </div>
      <div style={{...S.body,paddingBottom:32}}>
        <div style={{...S.card,background:'#f9fafb',display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          {[['Personnes',visit.persons||'—'],['Horaires',`${visit.startTime} → ${visit.endTime||'—'}`]].map(([l,v])=>(
            <div key={l}><p style={{margin:0,fontSize:11,color:'#9ca3af',fontWeight:600,textTransform:'uppercase'}}>{l}</p><p style={{margin:'2px 0 0',fontWeight:600,color:'#111827',fontSize:14}}>{v}</p></div>
          ))}
        </div>
        <p style={S.label}>{visit.observations.length} observation{visit.observations.length!==1?'s':''}</p>
        {visit.observations.map(o=>{
          const urg=urgOf(o.urgency);
          return (
            <div key={o.id} style={S.card}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                <span style={{fontWeight:700,color:'#111827',fontSize:14}}>{o.categoryLabel||o.category}</span>
                <span style={{fontSize:11,padding:'3px 10px',borderRadius:20,background:urg.bg,color:urg.color,fontWeight:600}}>{urg.emoji} {urg.label}</span>
              </div>
              {o.description&&<p style={{margin:'0 0 8px',fontSize:13,color:'#374151',lineHeight:1.5}}>{o.description}</p>}
              <p style={{margin:0,fontSize:12,color:'#9ca3af',background:'#f9fafb',padding:'8px 12px',borderRadius:8}}>Action : {o.action}{o.actionComment?` — ${o.actionComment}`:''}</p>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function Field({ label, type="text", value, onChange, placeholder="" }) {
  return (
    <div>
      <span style={S.label}>{label}</span>
      <input type={type} value={value} placeholder={placeholder} onChange={e=>onChange(e.target.value)} style={S.input} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
